<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema Auditoria - Oficial</title>
  <style>
    body { font-family: sans-serif; background: #f2f2f7; padding: 15px; display: flex; flex-direction: column; align-items: center; }
    .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 340px; }
    input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
    .btn-print  { width: 100%; padding: 15px; background: #34c759; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
    .btn-print:disabled { background: #a0a0a0; cursor: not-allowed; }
    .btn-status { width: 100%; padding: 10px; background: #007aff; color: white; border: none; border-radius: 10px; margin-bottom: 10px; cursor: pointer; font-size: 15px; }
    .btn-login  { width: 100%; padding: 12px; background: #ff3b30; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
    #status { margin-top: 10px; font-size: 14px; text-align: center; padding: 10px; border-radius: 8px; display: none; }
    #modal  { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 10; }
    .m-cont { background: white; margin: 10% auto; padding: 20px; width: 85%; max-width: 380px; border-radius: 15px; max-height: 75vh; overflow-y: auto; }
    .ranking-item { padding: 8px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .barra-fundo  { background: #e5e5ea; border-radius: 4px; height: 8px; flex: 1; }
    .barra-fill   { height: 8px; border-radius: 4px; }
    #acessoBanner { display: none; background: #fff3cd; border: 1px solid #ffc107; padding: 14px; border-radius: 10px; margin-bottom: 10px; text-align: center; width: 100%; max-width: 340px; box-sizing: border-box; }
  </style>
</head>
<body>

  <!-- Banner aparece se o usuario nao estiver logado no Google -->
  <div id="acessoBanner">
    <div style="font-size:24px">&#128274;</div>
    <b>Login necessario</b><br>
    <span style="font-size:13px">Faca login com sua conta Google <b>@meli</b> e recarregue a pagina.</span><br><br>
    <button class="btn-login" onclick="abrirLogin()">Fazer login no Google</button>
    <button style="width:100%;padding:8px;border-radius:8px;border:none;background:#e0e0e0;cursor:pointer" onclick="verificarAcesso()">Ja fiz login — verificar novamente</button>
  </div>

  <button class="btn-status" id="btnStatus" onclick="verStatus()" style="display:none">&#128202; VER STATUS ROTAS</button>

  <div class="card" id="mainCard" style="display:none">
    <div style="background:#f9f9f9; padding:10px; border-radius:8px; margin-bottom:10px;">
      <input type="text" id="ip"   placeholder="IP Impressora" onchange="sv()">
      <input type="text" id="resp" placeholder="Seu Nome"      onchange="sv()">
    </div>
    <input type="text"   id="log"  placeholder="Descricao Log">
    <input type="text"   id="saca" placeholder="N&#186; Saca" inputmode="numeric">
    <input type="number" id="qtd"  placeholder="Quantidade" min="1">
    <button id="btPrint" class="btn-print" onclick="processar()">IMPRIMIR</button>
    <div id="status"></div>
  </div>

  <div id="modal">
    <div class="m-cont">
      <h3 style="margin-top:0">Ranking Rotas</h3>
      <div id="lista"></div>
      <button style="width:100%;margin-top:15px;padding:10px;border-radius:8px;border:none;background:#f2f2f7;font-size:15px;cursor:pointer;" onclick="document.getElementById('modal').style.display='none'">FECHAR</button>
    </div>
  </div>

  <script>
    // ===================== CONFIGURAÇÕES =====================
    const SHEET_ID = '1EZ9fXbCu8hr8nS1jLJWAPTwefXo2EFQbmrMLodbN6LE';

    const URL_FORM = 'https://docs.google.com/forms/d/e/1FAIpQLSdgSXDTEh6bS_8TLS0o5qjJS-mHVZafm_XJb9Ofyxobp7Mpnw/formResponse';

    const FIELDS = {
      data:  'entry.1911248389',
      resp:  'entry.1107274403',
      audit: 'entry.1214123688',
      saca:  'entry.1271577756',
      qtd:   'entry.90002713',
      qr:    'entry.965325040',
      rota:  'entry.1257884009'
    };
    // =========================================================

    const getV = id => document.getElementById(id).value.trim();

    // Carrega aba via gviz JSONP — usa a sessao Google ja ativa no navegador
    // Nao precisa publicar a planilha: basta estar logado e ter acesso pelo dominio
    function carregarAba(sheetParam) {
      return new Promise((resolve, reject) => {
        const cb = '_gviz' + Date.now() + Math.random().toString(36).slice(2);
        const s  = document.createElement('script');

        const t = setTimeout(() => { cleanup(); reject(new Error('Timeout ao carregar dados')); }, 12000);

        function cleanup() {
          clearTimeout(t);
          delete window[cb];
          if (s.parentNode) s.remove();
        }

        window[cb] = (data) => {
          cleanup();
          if (!data || data.status === 'error') {
            const msg = data && data.errors ? data.errors[0].message : 'sem detalhes';
            reject(new Error('Sem acesso (' + sheetParam + '): ' + msg));
            return;
          }
          const numCols = (data.table.cols || []).length;
          const rows = (data.table.rows || []).map(row =>
            Array.from({ length: numCols }, (_, i) => {
              const cell = row.c ? row.c[i] : null;
              if (!cell || cell.v === null || cell.v === undefined) return '';
              const v = cell.v;
              if (typeof v === 'string' && v.startsWith('Date(')) {
                const n = v.slice(5, -1).split(',').map(Number);
                const d = new Date(n[0], n[1], n[2] || 1, n[3] || 0, n[4] || 0);
                const ds = d.toLocaleDateString('pt-BR');
                return n.length > 3
                  ? ds + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0')
                  : ds;
              }
              return cell.f !== undefined ? String(cell.f) : String(v);
            })
          );
          resolve(rows);
        };

        s.onerror = () => { cleanup(); reject(new Error('Erro de rede')); };
        s.src = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
                '/gviz/tq?tqx=out:json&' + sheetParam +
                '&callback=' + cb + '&_=' + Date.now();
        document.head.appendChild(s);
      });
    }

    // Verifica se o usuario tem acesso a planilha e mostra a UI correta
    async function verificarAcesso() {
      document.getElementById('acessoBanner').style.display = 'none';
      document.getElementById('btnStatus').style.display = 'none';
      document.getElementById('mainCard').style.display  = 'none';
      document.getElementById('acessoBanner').innerHTML =
        '<div style="padding:10px;text-align:center">Verificando acesso...</div>';
      document.getElementById('acessoBanner').style.display = 'block';

      try {
        await carregarAba('sheet=Base');
        // Acesso OK
        document.getElementById('acessoBanner').style.display = 'none';
        document.getElementById('btnStatus').style.display = 'block';
        document.getElementById('mainCard').style.display  = 'block';
      } catch (e) {
        // Sem acesso — mostra banner de login
        document.getElementById('acessoBanner').innerHTML =
          '<div style="font-size:24px">&#128274;</div>' +
          '<b>Login necessario</b><br>' +
          '<span style="font-size:13px">Faca login com sua conta Google <b>@meli</b> e recarregue a pagina.</span><br><br>' +
          '<button class="btn-login" onclick="abrirLogin()">Fazer login no Google</button>' +
          '<button style="width:100%;padding:8px;border-radius:8px;border:none;background:#e0e0e0;cursor:pointer;margin-top:6px" onclick="verificarAcesso()">Ja fiz login — verificar novamente</button>' +
          '<div style="font-size:11px;color:#888;margin-top:8px">Detalhe: ' + e.message + '</div>';
        document.getElementById('acessoBanner').style.display = 'block';
      }
    }

    function abrirLogin() {
      window.open('https://accounts.google.com/ServiceLogin?continue=https://docs.google.com/spreadsheets/d/' + SHEET_ID, '_blank');
    }

    window.onload = () => {
      document.getElementById('ip').value   = localStorage.getItem('ip') || '';
      document.getElementById('resp').value = localStorage.getItem('rp') || '';
      verificarAcesso();
    };

    const sv = () => {
      localStorage.setItem('ip', getV('ip'));
      localStorage.setItem('rp', getV('resp'));
    };

    function dataHoje() {
      return new Intl.DateTimeFormat('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric' }).format(new Date());
    }

    function dataHoraAtual() {
      return new Intl.DateTimeFormat('pt-BR', {
        day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'
      }).format(new Date());
    }

    function setStatus(msg, cor) {
      const el = document.getElementById('status');
      el.style.display  = 'block';
      el.style.background = cor || '#e6ffed';
      el.innerText = msg;
    }

    // -------- STATUS DAS ROTAS --------
    async function verStatus() {
      document.getElementById('modal').style.display = 'block';
      document.getElementById('lista').innerHTML = 'Carregando...';

      try {
        const [dadosRota, dadosLog] = await Promise.all([
          carregarAba('sheet=Rota'),
          carregarAba('gid=0')
        ]);

        const hoje = dataHoje();
        let totalPorRota = {};
        for (const row of dadosRota) {
          const r = row[1];
          if (r) totalPorRota[r] = (totalPorRota[r] || 0) + 1;
        }

        const sacasHoje = new Set();
        for (const row of dadosLog) {
          if (row[0] && row[0].startsWith(hoje) && row[3])
            sacasHoje.add(row[3].toString().trim());
        }

        let progresso = {};
        for (const row of dadosRota) {
          const saca = (row[0] || '').toString().trim();
          const rota = row[1];
          if (!saca || !rota) continue;
          if (!progresso[rota]) progresso[rota] = 0;
          if (sacasHoje.has(saca)) progresso[rota]++;
        }

        const ranking = [];
        for (const r in totalPorRota) {
          const tot = totalPorRota[r], feitas = progresso[r] || 0;
          ranking.push({ rota: r, pronta: feitas, total: tot, porc: (feitas / tot) * 100 });
        }
        ranking.sort((a, b) => b.porc - a.porc);

        if (!ranking.length) { document.getElementById('lista').innerHTML = 'Sem dados na aba Rota.'; return; }

        let h = '';
        for (const d of ranking) {
          const pct = Math.round(d.porc);
          const cor = pct === 100 ? '#34c759' : pct >= 50 ? '#ff9500' : '#ff3b30';
          h += '<div class="ranking-item">' +
               '<span style="min-width:80px"><b>' + d.rota + '</b></span>' +
               '<div class="barra-fundo"><div class="barra-fill" style="width:' + pct + '%;background:' + cor + '"></div></div>' +
               '<span style="min-width:75px;text-align:right;color:' + cor + '">' + d.pronta + '/' + d.total + ' (' + pct + '%)</span>' +
               '</div>';
        }
        document.getElementById('lista').innerHTML = h;

      } catch (e) {
        document.getElementById('lista').innerHTML =
          '<span style="color:#c0392b">Erro: ' + e.message + '</span>';
      }
    }

    // -------- PROCESSAR / IMPRIMIR --------
    async function processar() {
      const btn    = document.getElementById('btPrint');
      const ip     = getV('ip');
      const sacaId = getV('saca');
      const qtdVal = parseInt(getV('qtd'));

      if (!ip || !sacaId || !qtdVal || qtdVal < 1) {
        alert('Preencha IP da impressora, Nº Saca e Quantidade.');
        return;
      }

      btn.disabled = true;
      setStatus('Buscando saca na Base...', '#fff3cd');

      try {
        const dadosBase = await carregarAba('sheet=Base');

        let qrMae = '', rotaSaca = '';
        for (const row of dadosBase) {
          if ((row[1] || '').toString().trim() === sacaId) {
            qrMae    = row[0] || '';
            rotaSaca = row[2] || '';
            break;
          }
        }

        if (!qrMae) {
          setStatus('Saca nao encontrada na Base!', '#ffdce0');
          btn.disabled = false;
          return;
        }

        setStatus('Verificando historico...', '#fff3cd');
        const dadosLog = await carregarAba('gid=0');

        const hoje = dataHoje();
        let jaExiste = false;
        for (let j = dadosLog.length - 1; j >= 0; j--) {
          if (dadosLog[j][0] && dadosLog[j][0].startsWith(hoje) &&
              (dadosLog[j][3] || '').toString().trim() === sacaId) {
            jaExiste = true;
            break;
          }
        }

        if (jaExiste) {
          btn.disabled = false;
          if (!confirm('Saca ja lancada hoje.\nRegistrar nova impressao mesmo assim?')) {
            setStatus('Cancelado.', '#f2f2f7');
            return;
          }
          btn.disabled = true;
        }

        setStatus('Registrando no sistema...', '#fff3cd');
        const dataStr = dataHoraAtual();
        const form = new URLSearchParams();
        form.append(FIELDS.data,  dataStr);
        form.append(FIELDS.resp,  getV('resp'));
        form.append(FIELDS.audit, getV('log'));
        form.append(FIELDS.saca,  sacaId);
        form.append(FIELDS.qtd,   qtdVal);
        form.append(FIELDS.qr,    qrMae);
        form.append(FIELDS.rota,  rotaSaca);

        await fetch(URL_FORM, {
          method: 'POST', mode: 'no-cors',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: form
        });

        setStatus('Enviando para impressora...', '#fff3cd');
        let zpl = '';
        for (let k = 1; k <= qtdVal; k++) {
          const qr = k === 1 ? qrMae : sacaId + ' Saca ' + k + '-' + qtdVal;
          zpl += '^XA^CI28^PW800^LL800^MD25' +
                 '^FO250,30^BQN,2,7^FDQA,' + qr + '^FS' +
                 '^FO0,360^A0N,70,70^FB800,1,0,C^FD' + rotaSaca + ' - ' + sacaId + '^FS' +
                 '^FO0,480^A0N,60,60^FB800,1,0,C^FDSaca ' + k + ' de ' + qtdVal + '^FS' +
                 '^FO0,620^A0N,25,25^FB800,1,0,C^FD' + dataStr + ' | ' + getV('resp') + '^FS' +
                 '^FO0,660^A0N,25,25^FB800,1,0,C^FDAUDITORIA: ' + getV('log') + '^FS^XZ';
        }

        fetch('http://' + ip + '/pstprnt', { method: 'POST', body: zpl, mode: 'no-cors' })
          .then(() => {
            setStatus('Sucesso!', '#e6ffed');
            document.getElementById('saca').value = '';
            document.getElementById('qtd').value  = '';
          })
          .catch(() => setStatus('Registro salvo. Erro na impressora - verifique o IP.', '#ffdce0'))
          .finally(() => { btn.disabled = false; });

      } catch (e) {
        setStatus('Erro: ' + e.message, '#ffdce0');
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
