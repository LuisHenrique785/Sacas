<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema Auditoria - Oficial</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: sans-serif; background: #f2f2f7; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; }
    .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 340px; }
    input  { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
    .btn-green  { width: 100%; padding: 15px; background: #34c759; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
    .btn-green:disabled { background: #a0a0a0; cursor: not-allowed; }
    .btn-blue   { width: 100%; padding: 10px; background: #007aff; color: white; border: none; border-radius: 10px; margin-bottom: 10px; cursor: pointer; font-size: 15px; }
    #status { margin-top: 10px; font-size: 14px; text-align: center; padding: 10px; border-radius: 8px; display: none; }
    #modal  { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 10; }
    .m-cont { background: white; margin: 10% auto; padding: 20px; width: 85%; max-width: 380px; border-radius: 15px; max-height: 75vh; overflow-y: auto; }
    .ranking-item { padding: 8px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
    .barra-fundo  { background: #e5e5ea; border-radius: 4px; height: 8px; flex: 1; }
    .barra-fill   { height: 8px; border-radius: 4px; }
    #setupBanner  { background: #fff3cd; border: 1px solid #ffc107; padding: 14px; border-radius: 10px; margin-bottom: 10px; font-size: 13px; width: 100%; max-width: 340px; line-height: 1.6; display: none; }
  </style>
</head>
<body>

  <!-- Banner de setup (aparece somente quando SUPABASE_URL estiver vazio) -->
  <div id="setupBanner">
    <b>&#9888;&#65039; Supabase nao configurado</b><br><br>
    Siga o guia no README do repositorio para:<br>
    1. Criar projeto gratuito em <b>supabase.com</b><br>
    2. Criar as tabelas <code>base</code>, <code>rota</code>, <code>log</code><br>
    3. Importar os dados das abas do Google Sheets<br>
    4. Preencher <code>SUPABASE_URL</code> e <code>SUPABASE_KEY</code> neste arquivo
  </div>

  <button class="btn-blue" id="btnStatus" onclick="verStatus()">&#128202; VER STATUS ROTAS</button>

  <div class="card">
    <div style="background:#f9f9f9; padding:10px; border-radius:8px; margin-bottom:10px;">
      <input type="text" id="ip"   placeholder="IP Impressora" onchange="sv()">
      <input type="text" id="resp" placeholder="Seu Nome"      onchange="sv()">
    </div>
    <input type="text"   id="log"  placeholder="Descricao Log">
    <input type="text"   id="saca" placeholder="N&#186; Saca" inputmode="numeric">
    <input type="number" id="qtd"  placeholder="Quantidade" min="1">
    <button id="btPrint" class="btn-green" onclick="processar()">IMPRIMIR</button>
    <div id="status"></div>
  </div>

  <div id="modal">
    <div class="m-cont">
      <h3 style="margin-top:0">Ranking Rotas</h3>
      <div id="lista"></div>
      <button style="width:100%;margin-top:15px;padding:10px;border-radius:8px;border:none;background:#f2f2f7;font-size:15px;cursor:pointer" onclick="document.getElementById('modal').style.display='none'">FECHAR</button>
    </div>
  </div>

  <script>
    // ================================================================
    // CONFIGURAÇÃO SUPABASE
    // Crie o projeto em: https://supabase.com (gratis)
    // Copie a URL e a chave "anon public" em: Settings → API
    // ================================================================
    const SUPABASE_URL = '';   // ex: https://xyzxyz.supabase.co
    const SUPABASE_KEY = '';   // chave "anon public"
    // ================================================================

    window.onload = () => {
      document.getElementById('ip').value   = localStorage.getItem('ip') || '';
      document.getElementById('resp').value = localStorage.getItem('rp') || '';
      if (!SUPABASE_URL || !SUPABASE_KEY) {
        document.getElementById('setupBanner').style.display = 'block';
        document.getElementById('btPrint').disabled = true;
      }
    };

    const getV = id => document.getElementById(id).value.trim();
    const sv = () => {
      localStorage.setItem('ip', getV('ip'));
      localStorage.setItem('rp', getV('resp'));
    };

    // Wrapper para chamadas REST do Supabase
    async function sb(path, options = {}) {
      const url = SUPABASE_URL + '/rest/v1/' + path;
      const resp = await fetch(url, {
        ...options,
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY,
          'Content-Type': 'application/json',
          'Prefer': options.method === 'POST' ? 'return=minimal' : undefined,
          ...(options.headers || {})
        }
      });
      if (!resp.ok) {
        const e = await resp.json().catch(() => ({}));
        throw new Error(e.message || e.error || 'HTTP ' + resp.status);
      }
      if (resp.status === 204 || options.method === 'POST') return null;
      return resp.json();
    }

    function dataHoje() {
      return new Intl.DateTimeFormat('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric' }).format(new Date());
    }
    function dataHoraAtual() {
      return new Intl.DateTimeFormat('pt-BR', {
        day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'
      }).format(new Date());
    }
    function setStatus(msg, cor) {
      const el = document.getElementById('status');
      el.style.display   = 'block';
      el.style.background = cor || '#e6ffed';
      el.innerText = msg;
    }

    // -------- STATUS DAS ROTAS --------
    async function verStatus() {
      document.getElementById('modal').style.display = 'block';
      document.getElementById('lista').innerHTML = 'Carregando...';
      try {
        const hoje = dataHoje();

        // Busca todas as rotas e log de hoje em paralelo
        const [dadosRota, dadosLog] = await Promise.all([
          sb('rota?select=saca_id,rota'),
          sb('log?select=saca_id&data=like.' + encodeURIComponent(hoje + '%'))
        ]);

        let totalPorRota = {};
        for (const row of dadosRota) {
          if (row.rota) totalPorRota[row.rota] = (totalPorRota[row.rota] || 0) + 1;
        }

        const sacasHoje = new Set(dadosLog.map(r => (r.saca_id || '').trim()));

        let progresso = {};
        for (const row of dadosRota) {
          const saca = (row.saca_id || '').trim();
          const rota = row.rota;
          if (!saca || !rota) continue;
          if (!progresso[rota]) progresso[rota] = 0;
          if (sacasHoje.has(saca)) progresso[rota]++;
        }

        const ranking = [];
        for (const r in totalPorRota) {
          const tot = totalPorRota[r], feitas = progresso[r] || 0;
          ranking.push({ rota: r, pronta: feitas, total: tot, porc: (feitas / tot) * 100 });
        }
        ranking.sort((a, b) => b.porc - a.porc);

        if (!ranking.length) { document.getElementById('lista').innerHTML = 'Sem dados na tabela rota.'; return; }

        let h = '';
        for (const d of ranking) {
          const pct = Math.round(d.porc);
          const cor = pct === 100 ? '#34c759' : pct >= 50 ? '#ff9500' : '#ff3b30';
          h += '<div class="ranking-item">' +
               '<span style="min-width:80px"><b>' + d.rota + '</b></span>' +
               '<div class="barra-fundo"><div class="barra-fill" style="width:' + pct + '%;background:' + cor + '"></div></div>' +
               '<span style="min-width:75px;text-align:right;color:' + cor + '">' + d.pronta + '/' + d.total + ' (' + pct + '%)</span>' +
               '</div>';
        }
        document.getElementById('lista').innerHTML = h;

      } catch (e) {
        document.getElementById('lista').innerHTML = '<span style="color:#c0392b">Erro: ' + e.message + '</span>';
      }
    }

    // -------- PROCESSAR / IMPRIMIR --------
    async function processar() {
      const btn    = document.getElementById('btPrint');
      const ip     = getV('ip');
      const sacaId = getV('saca');
      const qtdVal = parseInt(getV('qtd'));

      if (!ip || !sacaId || !qtdVal || qtdVal < 1) {
        alert('Preencha IP da impressora, Nº Saca e Quantidade.');
        return;
      }

      btn.disabled = true;
      setStatus('Buscando saca na Base...', '#fff3cd');

      try {
        // Busca a saca na tabela base
        const baseRows = await sb('base?saca_id=eq.' + encodeURIComponent(sacaId) + '&select=qr_mae,rota&limit=1');

        if (!baseRows || !baseRows.length || !baseRows[0].qr_mae) {
          setStatus('Saca nao encontrada na Base!', '#ffdce0');
          btn.disabled = false;
          return;
        }
        const qrMae    = baseRows[0].qr_mae;
        const rotaSaca = baseRows[0].rota || '';

        // Verifica se já foi lançada hoje
        setStatus('Verificando historico...', '#fff3cd');
        const hoje = dataHoje();
        const logHoje = await sb(
          'log?saca_id=eq.' + encodeURIComponent(sacaId) +
          '&data=like.' + encodeURIComponent(hoje + '%') +
          '&select=id&limit=1'
        );

        if (logHoje && logHoje.length > 0) {
          btn.disabled = false;
          if (!confirm('Saca ja lancada hoje.\nRegistrar nova impressao mesmo assim?')) {
            setStatus('Cancelado.', '#f2f2f7');
            return;
          }
          btn.disabled = true;
        }

        // Grava no log
        setStatus('Registrando no sistema...', '#fff3cd');
        const dataStr = dataHoraAtual();
        await sb('log', {
          method: 'POST',
          body: JSON.stringify({
            data:        dataStr,
            responsavel: getV('resp'),
            auditoria:   getV('log'),
            saca_id:     sacaId,
            qtd:         qtdVal,
            qr_mae:      qrMae,
            rota:        rotaSaca
          })
        });

        // Gera ZPL e envia para impressora
        setStatus('Enviando para impressora...', '#fff3cd');
        let zpl = '';
        for (let k = 1; k <= qtdVal; k++) {
          const qr = k === 1 ? qrMae : sacaId + ' Saca ' + k + '-' + qtdVal;
          zpl += '^XA^CI28^PW800^LL800^MD25' +
                 '^FO250,30^BQN,2,7^FDQA,' + qr + '^FS' +
                 '^FO0,360^A0N,70,70^FB800,1,0,C^FD' + rotaSaca + ' - ' + sacaId + '^FS' +
                 '^FO0,480^A0N,60,60^FB800,1,0,C^FDSaca ' + k + ' de ' + qtdVal + '^FS' +
                 '^FO0,620^A0N,25,25^FB800,1,0,C^FD' + dataStr + ' | ' + getV('resp') + '^FS' +
                 '^FO0,660^A0N,25,25^FB800,1,0,C^FDAUDITORIA: ' + getV('log') + '^FS^XZ';
        }

        fetch('http://' + ip + '/pstprnt', { method: 'POST', body: zpl, mode: 'no-cors' })
          .then(() => {
            setStatus('✅ Sucesso!', '#e6ffed');
            document.getElementById('saca').value = '';
            document.getElementById('qtd').value  = '';
          })
          .catch(() => setStatus('Registro salvo. Erro na impressora — verifique o IP.', '#ffdce0'))
          .finally(() => { btn.disabled = false; });

      } catch (e) {
        setStatus('Erro: ' + e.message, '#ffdce0');
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
